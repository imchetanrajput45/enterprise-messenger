# Render Blueprint — deploy all 6 services
# https://render.com/docs/blueprint-spec
#
# NOTE: Secret env vars (DATABASE_URL, REDIS_PASSWORD, KAFKA_*, JWT_SECRET) must be set
# manually in the Render dashboard → Service → Environment tab.
# Never commit real credentials to this file.

services:
  # ─── Service Registry (Eureka) ──────────────────────────
  - type: web
    name: service-registry
    runtime: docker
    dockerfilePath: service-registry/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: EUREKA_HOSTNAME
        value: service-registry.onrender.com
    healthCheckPath: /actuator/health

  # ─── Config Server ─────────────────────────────────────
  - type: web
    name: config-server
    runtime: docker
    dockerfilePath: config-server/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: EUREKA_URL
        fromService:
          name: service-registry
          type: web
          property: host
    healthCheckPath: /actuator/health

  # ─── API Gateway ───────────────────────────────────────
  - type: web
    name: api-gateway
    runtime: docker
    dockerfilePath: api-gateway/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: EUREKA_URL
        fromService:
          name: service-registry
          type: web
          property: host
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # Set in Render dashboard: https://YOUR_APP.vercel.app
      - key: REDIS_HOST
        sync: false   # Set in Render dashboard: your Upstash Redis host
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false   # Set in Render dashboard
      - key: REDIS_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false   # Set in Render dashboard
    healthCheckPath: /actuator/health

  # ─── Auth Service ──────────────────────────────────────
  - type: web
    name: auth-service
    runtime: docker
    dockerfilePath: auth-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: EUREKA_URL
        fromService:
          name: service-registry
          type: web
          property: host
      - key: DATABASE_URL
        sync: false   # Set in Render dashboard: jdbc:postgresql://...?currentSchema=auth_schema&sslmode=require
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false   # Set in Render dashboard: your Aiven/Upstash Kafka endpoint
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: SCRAM-SHA-256
      - key: KAFKA_SASL_JAAS_CONFIG
        sync: false   # Set in Render dashboard
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_SSL
        value: "true"
    healthCheckPath: /actuator/health

  # ─── User Service ──────────────────────────────────────
  - type: web
    name: user-service
    runtime: docker
    dockerfilePath: user-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: EUREKA_URL
        fromService:
          name: service-registry
          type: web
          property: host
      - key: DATABASE_URL
        sync: false   # Set in Render dashboard: jdbc:postgresql://...?currentSchema=user_schema&sslmode=require
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: SCRAM-SHA-256
      - key: KAFKA_SASL_JAAS_CONFIG
        sync: false
    healthCheckPath: /actuator/health

  # ─── Messaging Service ─────────────────────────────────
  - type: web
    name: messaging-service
    runtime: docker
    dockerfilePath: messaging-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: EUREKA_URL
        fromService:
          name: service-registry
          type: web
          property: host
      - key: DATABASE_URL
        sync: false   # Set in Render dashboard: jdbc:postgresql://...?currentSchema=messaging_schema&sslmode=require
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: SCRAM-SHA-256
      - key: KAFKA_SASL_JAAS_CONFIG
        sync: false
    healthCheckPath: /actuator/health
