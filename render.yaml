# Render Blueprint — deploy all 6 services
# https://render.com/docs/blueprint-spec

services:
  # ─── Service Registry (Eureka) ──────────────────────────
  - type: web
    name: service-registry
    runtime: docker
    dockerfilePath: service-registry/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: EUREKA_HOSTNAME
        value: service-registry
    healthCheckPath: /actuator/health

  # ─── Config Server ─────────────────────────────────────
  - type: web
    name: config-server
    runtime: docker
    dockerfilePath: config-server/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: EUREKA_URL
        fromService:
          name: service-registry
          type: web
          property: hostport
    healthCheckPath: /actuator/health

  # ─── API Gateway ───────────────────────────────────────
  - type: web
    name: api-gateway
    runtime: docker
    dockerfilePath: api-gateway/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: EUREKA_URL
        fromService:
          name: service-registry
          type: web
          property: hostport
      - key: CORS_ALLOWED_ORIGINS
        value: https://YOUR_VERCEL_APP.vercel.app
      - key: REDIS_HOST
        value: YOUR_UPSTASH_REDIS_HOST
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        value: YOUR_UPSTASH_REDIS_PASSWORD
      - key: REDIS_SSL
        value: "true"
    healthCheckPath: /actuator/health

  # ─── Auth Service ──────────────────────────────────────
  - type: web
    name: auth-service
    runtime: docker
    dockerfilePath: auth-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: EUREKA_URL
        fromService:
          name: service-registry
          type: web
          property: hostport
      - key: DATABASE_URL
        value: YOUR_NEON_JDBC_URL?currentSchema=auth_schema
      - key: DATABASE_USERNAME
        value: YOUR_NEON_USERNAME
      - key: DATABASE_PASSWORD
        value: YOUR_NEON_PASSWORD
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: YOUR_UPSTASH_KAFKA_ENDPOINT
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: SCRAM-SHA-256
      - key: REDIS_HOST
        value: YOUR_UPSTASH_REDIS_HOST
      - key: REDIS_PASSWORD
        value: YOUR_UPSTASH_REDIS_PASSWORD
      - key: REDIS_SSL
        value: "true"
    healthCheckPath: /actuator/health

  # ─── User Service ──────────────────────────────────────
  - type: web
    name: user-service
    runtime: docker
    dockerfilePath: user-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: EUREKA_URL
        fromService:
          name: service-registry
          type: web
          property: hostport
      - key: DATABASE_URL
        value: YOUR_NEON_JDBC_URL?currentSchema=user_schema
      - key: DATABASE_USERNAME
        value: YOUR_NEON_USERNAME
      - key: DATABASE_PASSWORD
        value: YOUR_NEON_PASSWORD
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: YOUR_UPSTASH_KAFKA_ENDPOINT
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: SCRAM-SHA-256
    healthCheckPath: /actuator/health

  # ─── Messaging Service ─────────────────────────────────
  - type: web
    name: messaging-service
    runtime: docker
    dockerfilePath: messaging-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: EUREKA_URL
        fromService:
          name: service-registry
          type: web
          property: hostport
      - key: DATABASE_URL
        value: YOUR_NEON_JDBC_URL?currentSchema=messaging_schema
      - key: DATABASE_USERNAME
        value: YOUR_NEON_USERNAME
      - key: DATABASE_PASSWORD
        value: YOUR_NEON_PASSWORD
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: YOUR_UPSTASH_KAFKA_ENDPOINT
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: SCRAM-SHA-256
    healthCheckPath: /actuator/health
