databaseChangeLog:
  - changeSet:
      id: 006-seed-default-roles
      author: enterprise-messenger
      changes:
        - insert:
            schemaName: auth_schema
            tableName: roles
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: name
                  value: ROLE_USER
              - column:
                  name: description
                  value: Standard user role
              - column:
                  name: created_at
                  valueComputed: NOW()
              - column:
                  name: updated_at
                  valueComputed: NOW()
        - insert:
            schemaName: auth_schema
            tableName: roles
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: name
                  value: ROLE_ADMIN
              - column:
                  name: description
                  value: Administrator role
              - column:
                  name: created_at
                  valueComputed: NOW()
              - column:
                  name: updated_at
                  valueComputed: NOW()
        - insert:
            schemaName: auth_schema
            tableName: roles
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: name
                  value: ROLE_MODERATOR
              - column:
                  name: description
                  value: Content moderator role
              - column:
                  name: created_at
                  valueComputed: NOW()
              - column:
                  name: updated_at
                  valueComputed: NOW()
