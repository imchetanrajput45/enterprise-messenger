databaseChangeLog:
  - changeSet:
      id: 005-create-devices-table
      author: enterprise-messenger
      changes:
        - createTable:
            schemaName: auth_schema
            tableName: devices
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: device_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: device_name
                  type: varchar(255)
              - column:
                  name: device_type
                  type: varchar(50)
              - column:
                  name: push_token
                  type: varchar(512)
              - column:
                  name: last_active_at
                  type: timestamp
              - column:
                  name: is_trusted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableSchemaName: auth_schema
            baseTableName: devices
            baseColumnNames: user_id
            referencedTableSchemaName: auth_schema
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_devices_user_id
            onDelete: CASCADE
        - addUniqueConstraint:
            schemaName: auth_schema
            tableName: devices
            columnNames: user_id, device_id
            constraintName: uq_devices_user_device
        - createIndex:
            schemaName: auth_schema
            tableName: devices
            indexName: idx_devices_user_id
            columns:
              - column:
                  name: user_id
