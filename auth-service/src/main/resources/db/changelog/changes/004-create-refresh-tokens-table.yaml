databaseChangeLog:
  - changeSet:
      id: 004-create-refresh-tokens-table
      author: enterprise-messenger
      changes:
        - createTable:
            schemaName: auth_schema
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: varchar(512)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: device_id
                  type: varchar(255)
              - column:
                  name: expires_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: revoked
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableSchemaName: auth_schema
            baseTableName: refresh_tokens
            baseColumnNames: user_id
            referencedTableSchemaName: auth_schema
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_refresh_tokens_user_id
            onDelete: CASCADE
        - createIndex:
            schemaName: auth_schema
            tableName: refresh_tokens
            indexName: idx_refresh_tokens_token
            columns:
              - column:
                  name: token
        - createIndex:
            schemaName: auth_schema
            tableName: refresh_tokens
            indexName: idx_refresh_tokens_user_id
            columns:
              - column:
                  name: user_id
