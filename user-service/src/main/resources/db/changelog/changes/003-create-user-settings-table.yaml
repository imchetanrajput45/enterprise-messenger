databaseChangeLog:
  - changeSet:
      id: 003-create-user-settings-table
      author: enterprise-messenger
      changes:
        - createTable:
            schemaName: user_schema
            tableName: user_settings
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: read_receipts
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: typing_indicator
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: online_status
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: notification_sound
                  type: varchar(100)
                  defaultValue: default
              - column:
                  name: theme
                  type: varchar(20)
                  defaultValue: SYSTEM
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - createIndex:
            schemaName: user_schema
            tableName: user_settings
            indexName: idx_user_settings_user_id
            columns:
              - column:
                  name: user_id
