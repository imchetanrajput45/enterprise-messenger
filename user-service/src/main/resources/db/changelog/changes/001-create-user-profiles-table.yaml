databaseChangeLog:
  - changeSet:
      id: 001-create-user-profiles-table
      author: enterprise-messenger
      changes:
        - createTable:
            schemaName: user_schema
            tableName: user_profiles
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: auth_user_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: display_name
                  type: varchar(100)
              - column:
                  name: avatar_url
                  type: varchar(512)
              - column:
                  name: status_text
                  type: varchar(255)
                  defaultValue: "Hey there! I am using Enterprise Messenger"
              - column:
                  name: bio
                  type: varchar(500)
              - column:
                  name: timezone
                  type: varchar(50)
              - column:
                  name: locale
                  type: varchar(10)
                  defaultValue: en
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - createIndex:
            schemaName: user_schema
            tableName: user_profiles
            indexName: idx_user_profiles_auth_user_id
            columns:
              - column:
                  name: auth_user_id
